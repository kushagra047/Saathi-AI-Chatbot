<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saathi - Register</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #343541; color: white; }
        .auth-container { background-color: #202123; padding: 40px; border-radius: 10px; width: 100%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; }
        h2 { color: #10A37F; margin-top: 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #d1d5db; }
        .input-group input { width: 100%; padding: 10px; background-color: #40414F; border: 1px solid #565869; border-radius: 5px; color: white; font-size: 16px; outline: none; box-sizing: border-box; }
        button { width: 100%; background-color: #10A37F; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0d8a6a; }
        .links { margin-top: 15px; font-size: 14px; }
        .links a { color: #10A37F; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .flash-msg { background-color: #ff6b6b; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Create New Account</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/register">
        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Sign Up</button>
    </form>
    
    <div class="links">
        Already have an account? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
