<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saathi - Your AI Companion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { 
            --deep-navy: #0a192f; 
            --sidebar-bg: #112240; 
            --accent-blue: #64ffda; 
            --text-white: #e6f1ff;
            --text-gray: #8892b0;
            --user-bubble: #1d3557;
            --bot-bubble: #172a45; 
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: var(--deep-navy); 
            color: var(--text-white);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- Sidebar --- */
        .sidebar { 
            width: 260px; background: var(--sidebar-bg); 
            padding: 20px; display: flex; flex-direction: column; 
            border-right: 1px solid #233554;
        }

        .new-chat-btn {
            background: rgba(100, 255, 218, 0.1);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 12px; border-radius: 25px; width: 100%;
            cursor: pointer; margin-bottom: 25px; font-weight: 500;
            transition: 0.3s;
        }
        .new-chat-btn:hover { background: rgba(100, 255, 218, 0.2); }

        .chat-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 15px; margin-bottom: 5px; border-radius: 8px; 
            position: relative; transition: 0.2s;
        }
        .chat-item:hover, .chat-item.active { background: #233554; }
        .chat-title { 
            flex-grow: 1; cursor: pointer; font-size: 14px; color: var(--text-white);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- 3 Dots Dropdown --- */
        .menu-btn { background: none; border: none; color: var(--text-gray); cursor: pointer; padding: 5px; }
        .menu-btn:hover { color: var(--accent-blue); }
        
        .dropdown { 
            position: absolute; right: 0; top: 40px; background: #172a45; 
            border: 1px solid #233554; border-radius: 8px; display: none; 
            flex-direction: column; width: 140px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .dropdown button { 
            background: none; border: none; color: var(--text-white); 
            padding: 10px 15px; text-align: left; cursor: pointer; font-size: 13px;
        }
        .dropdown button:hover { background: #233554; color: var(--accent-blue); }

        /* --- Chat Area --- */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #chat-container { 
            flex-grow: 1; padding: 40px 15% 20px 15%; overflow-y: auto; 
            display: flex; flex-direction: column; 
        }

        .message { max-width: 85%; margin-bottom: 30px; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: var(--user-bubble); padding: 12px 20px; border-radius: 20px 20px 0 20px; }
        
        .assistant { align-self: flex-start; width: 100%; }
        .assistant .content { background: transparent; padding: 0; line-height: 1.7; color: var(--text-white); }

        /* --- Gemini-style Copy Button --- */
        .copy-btn {
            background: none; border: none; color: var(--text-gray);
            cursor: pointer; font-size: 14px; margin-top: 8px;
            padding: 5px; border-radius: 5px; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .copy-btn:hover { color: var(--accent-blue); background: rgba(100, 255, 218, 0.05); }

        /* --- Input Area --- */
        .input-box { padding: 20px 15% 40px 15%; background: var(--deep-navy); }
        .input-wrapper { 
            display: flex; align-items: center; background: #112240; 
            border-radius: 30px; padding: 10px 20px; border: 1px solid #233554;
        }
        input { 
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 10px; outline: none; font-size: 16px; 
        }
        .typing { color: var(--accent-blue); font-size: 13px; margin-bottom: 10px; margin-left: 10px; }

        /* NEW: Mic Active Animation */
        .mic-active { color: #ff6b6b !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent-blue); margin-bottom: 20px; font-size: 22px;">Saathi</h2>
    <button class="new-chat-btn" onclick="location.href='/new_chat'">+ New Chat</button>
    <div style="overflow-y:auto; flex-grow: 1;">
        {% for chat in chats %}
            <div class="chat-item {% if chat.id == current_chat.id %}active{% endif %}">
                <div class="chat-title" onclick="location.href='/chat/{{chat.id}}'">
                    {% if chat.is_pinned %}📌{% else %}💬{% endif %} {{ chat.title }}
                </div>
                <button class="menu-btn" onclick="toggleMenu(event, 'menu-{{ chat.id }}')">⋮</button>
                <div class="dropdown" id="menu-{{ chat.id }}">
                    <button onclick="pinChat('{{ chat.id }}')"><i class="fas fa-thumbtack"></i> Pin</button>
                    <button onclick="shareChat('{{ chat.id }}')"><i class="fas fa-share-alt"></i> Share</button>
                    <button onclick="deleteChat('{{ chat.id }}')" style="color: #ff6b6b;"><i class="fas fa-trash"></i> Delete</button>
                </div>
            </div>
        {% endfor %}
    </div>
    <a href="/logout" style="color: var(--text-gray); text-decoration: none; font-size: 14px; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="chat-area">
    <div id="chat-container">
        {% for msg in messages %}
            <div class="message {{ msg.role }}">
                <div class="content">{{ msg.content }}</div>
                {% if msg.role == 'assistant' %}
                    <button class="copy-btn" onclick="copyText(this)"><i class="far fa-copy"></i></button>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    
    <div class="input-box">
        <div id="typing-status" class="typing" style="display:none;">Saathi is thinking...</div>
        <div class="input-wrapper">
            <button id="mic-btn" class="menu-btn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
            <input type="text" id="user-input" placeholder="Ask Saathi anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="menu-btn" onclick="sendMessage()"><i class="fas fa-paper-plane" style="color: var(--accent-blue);"></i></button>
        </div>
    </div>
</div>

<script>
    // 1. Markdown & Copy Setup
    function renderMarkdown() {
        document.querySelectorAll('.assistant .content').forEach(el => {
            if (!el.dataset.rendered) {
                el.innerHTML = marked.parse(el.innerText);
                el.dataset.rendered = "true";
            }
        });
    }
    renderMarkdown();

    function copyText(btn) {
        const text = btn.previousElementSibling.innerText;
        navigator.clipboard.writeText(text);
        const icon = btn.querySelector('i');
        icon.className = 'fas fa-check';
        setTimeout(() => { icon.className = 'far fa-copy'; }, 2000);
    }

    // 2. Menu Logic
    function toggleMenu(event, id) {
        event.stopPropagation();
        document.querySelectorAll('.dropdown').forEach(d => { if (d.id !== id) d.style.display = 'none'; });
        const menu = document.getElementById(id);
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }
    document.addEventListener('click', () => document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none'));

    // 3. Send Message
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        // Add User Message
        const container = document.getElementById('chat-container');
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerHTML = `<div class="content">${text}</div>`;
        container.appendChild(userDiv);
        input.value = '';
        
        document.getElementById('typing-status').style.display = 'block';
        container.scrollTop = container.scrollHeight;

        try {
            const response = await fetch('/get_response', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: text, chat_id: '{{ current_chat.id }}' })
            });
            const data = await response.json();
            
            document.getElementById('typing-status').style.display = 'none';
            const botDiv = document.createElement('div');
            botDiv.className = 'message assistant';
            botDiv.innerHTML = `
                <div class="content">${marked.parse(data.reply)}</div>
                <button class="copy-btn" onclick="copyText(this)"><i class="far fa-copy"></i></button>
            `;
            container.appendChild(botDiv);
            container.scrollTop = container.scrollHeight;
        } catch(e) {
            document.getElementById('typing-status').style.display = 'none';
            alert("Connection lost.");
        }
    }

    // 4. Voice Command Logic (FIXED & ADDED)
    let recognition;
    function toggleVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Bhai, tumhara browser voice command support nahi karta. Chrome ya Edge use karo.");
            return;
        }

        if (!recognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-IN'; // Hinglish samajhne ke liye best
            recognition.continuous = false;
            
            recognition.onstart = () => {
                document.getElementById('mic-btn').classList.add('mic-active');
            };
            
            recognition.onend = () => {
                document.getElementById('mic-btn').classList.remove('mic-active');
            };
            
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('user-input').value = text;
                sendMessage(); // Text box mein aate hi auto-send
            };
            
            recognition.onerror = (e) => {
                document.getElementById('mic-btn').classList.remove('mic-active');
                if (e.error === 'not-allowed') {
                    alert("Mic permission denied! URL bar ke left mein lock icon par click karke mic Allow karo.");
                } else if (e.error !== 'no-speech') {
                    alert("Voice error: " + e.error);
                }
            };
        }
        
        try {
            recognition.start();
        } catch (err) {
            console.log("Mic pehle se sun raha hai...");
        }
    }

    // 5. Database Actions (Pin/Delete/Share)
    async function pinChat(id) { await fetch(`/pin_chat/${id}`, {method:'POST'}); location.reload(); }
    async function deleteChat(id) { if(confirm("Delete chat?")) { await fetch(`/delete_chat/${id}`, {method:'POST'}); window.location.href='/chat'; } }
    async function shareChat(id) {
        const res = await fetch(`/share_chat/${id}`);
        const data = await res.json();
        navigator.clipboard.writeText(data.share_text);
        alert("History copied!");
    }
</script>

</body>
